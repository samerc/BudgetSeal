<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PocketPlan Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <div id="app">
    <!-- Auth screen (visible by default; hidden after successful token check) -->
    <div id="auth-screen">
      <div class="auth-card">
        <div class="auth-logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="12" fill="#2563EB"/>
            <path d="M14 24C14 18.477 18.477 14 24 14s10 4.477 10 10-4.477 10-10 10S14 29.523 14 24z" fill="white" fill-opacity="0.2"/>
            <path d="M24 20v8M20 24h8" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
        <h1>PocketPlan</h1>
        <p class="auth-subtitle">Enter your PIN to continue</p>
        <div id="pin-input-area">
          <div class="pin-dots" id="pin-dots">
            <div class="pin-dot" id="dot-0"></div>
            <div class="pin-dot" id="dot-1"></div>
            <div class="pin-dot" id="dot-2"></div>
            <div class="pin-dot" id="dot-3"></div>
          </div>
          <div id="auth-error" class="error-text hidden"></div>
          <div class="numpad">
            <button class="num-btn" data-num="1">1</button>
            <button class="num-btn" data-num="2">2</button>
            <button class="num-btn" data-num="3">3</button>
            <button class="num-btn" data-num="4">4</button>
            <button class="num-btn" data-num="5">5</button>
            <button class="num-btn" data-num="6">6</button>
            <button class="num-btn" data-num="7">7</button>
            <button class="num-btn" data-num="8">8</button>
            <button class="num-btn" data-num="9">9</button>
            <div></div>
            <button class="num-btn" data-num="0">0</button>
            <button class="num-btn del-btn" id="del-btn">⌫</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Main layout (shown after auth) -->
    <div id="main-layout" class="hidden">
      <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu">☰</button>
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <nav id="sidebar">
        <div class="nav-brand">
          <span class="nav-logo">PP</span>
          <span class="nav-title">PocketPlan</span>
        </div>
        <ul class="nav-links">
          <li><a href="#/" class="nav-link" data-route="#/">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
            <span class="nav-text">Dashboard</span>
          </a></li>
          <li><a href="#/transactions" class="nav-link" data-route="#/transactions">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></svg></span>
            <span class="nav-text">Transactions</span>
          </a></li>
          <li><a href="#/categories" class="nav-link" data-route="#/categories">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></svg></span>
            <span class="nav-text">Categories</span>
          </a></li>
          <li><a href="#/accounts" class="nav-link" data-route="#/accounts">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg></span>
            <span class="nav-text">Accounts</span>
          </a></li>
          <li><a href="#/envelopes" class="nav-link" data-route="#/envelopes">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>
            <span class="nav-text">Envelopes</span>
          </a></li>
          <li><a href="#/recurring" class="nav-link" data-route="#/recurring">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg></span>
            <span class="nav-text">Recurring</span>
          </a></li>
          <li><a href="#/subscriptions" class="nav-link" data-route="#/subscriptions">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
            <span class="nav-text">Subscriptions</span>
          </a></li>
          <li><a href="#/reports" class="nav-link" data-route="#/reports">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg></span>
            <span class="nav-text">Reports</span>
          </a></li>
        </ul>
        <div class="nav-bottom">
          <button class="nav-bottom-btn" onclick="cycleTheme()">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg></span>
            <span class="nav-text" id="theme-label">Auto</span>
          </button>
          <button class="nav-bottom-btn" onclick="showShortcutsHelp()">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg></span>
            <span class="nav-text">Shortcuts</span>
          </button>
          <div class="nav-bottom-btn nav-status">
            <div id="conn-dot" class="conn-dot"></div>
            <span class="nav-text">Server</span>
          </div>
          <button id="sign-out-btn" class="nav-bottom-btn nav-signout">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg></span>
            <span class="nav-text">Sign out</span>
          </button>
        </div>
      </nav>

      <div id="content-area">
        <div id="content"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
