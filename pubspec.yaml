name: budgetseal
description: Allocation-first household finance manager.
publish_to: 'none'
version: 0.9.0+3

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database — Drift (type-safe SQLite ORM)
  drift: ^2.22.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol

  # State management — Riverpod
  flutter_riverpod: ^3.0.0

  # Material You dynamic theming
  dynamic_color: ^1.7.0

  # Navigation
  go_router: ^17.0.0

  # HTTP
  dio: ^5.9.0
  http: ^1.0.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.20.0

  # Charts
  fl_chart: ^1.2.0

  # Storage & file access
  shared_preferences: ^2.5.0
  path_provider: ^2.1.0
  package_info_plus: ^9.0.0
  path: ^1.9.0

  # UI helpers
  google_fonts: ^8.0.0
  shimmer: ^3.0.0
  local_auth: ^3.0.0
  image_picker: ^1.1.0
  csv: ^8.0.0
  share_plus: ^12.0.0
  file_picker: ^11.0.0
  flutter_local_notifications: ^21.0.0

  # Cloud sync
  google_sign_in: ^7.0.0
  googleapis: ^16.0.0
  googleapis_auth: ^2.0.0
  sliver_tools: ^0.2.12
  timezone: ^0.11.0
  confetti: ^0.8.0
  google_mlkit_text_recognition: ^0.15.1
  encrypt: ^5.0.3
  flutter_secure_storage: ^10.0.0
  pointycastle: ^3.9.1
  flutter_timezone: ^5.0.2

  # Web Companion (local HTTP server)
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  network_info_plus: ^7.0.0
  qr_widget: ^4.1.0
  flutter_foreground_task: ^9.0.0
  wakelock_plus: ^1.5.0
  crypto: ^3.0.0
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.0
  drift_dev: ^2.22.0

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/categories/
    - assets/web/
